<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Kurnik Shooter</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #2b1b12;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #70411f;
      touch-action: none;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  let W = 0;
  let H = 0;
  let DPR = 1;

  let state = 'start';
  let score = 0;
  let lives = 3;
  let startTime = 0;
  let lastTime = 0;
  let stateStart = 0;
  let chickenPhaseStart = 0;
  let totalChickenTime = 0;
  let ammo = 20;
  let gameOverReason = '';
  let nextSpawn = 0;
  let nextEgg = 0;
  let nextGoldenEgg = 0;
  let nextAmmoPack = 0;
  let muzzleFlash = 0;
  let shake = 0;
  let bossHits = 0;
  let bossDeadAnim = 0;
  let activeWeakspot = null;
  let audioCtx = null;

  let chickens = [];
  let eggs = [];
  let goldenEggs = [];
  let ammoPacks = [];
  let popups = [];
  let shotMarks = [];
  let particles = [];
  let shells = [];
  let gunKick = 0;

  const MAX_LIVES = 3;
  const START_AMMO = 20;
  const AMMO_PACK_ADD = 5;
  const AMMO_PACK_INTERVAL_MS = 3000;
  const AMMO_PACK_VISIBLE_MS = 3000;
  const MAX_CHICKENS = 2;
  const BOSS_AFTER_MS = 30000;
  const BOSS_EGG_PHASE_MS = 15000;
  const EGG_TRAVEL_MS = 3000;
  const GOLDEN_EGG_FALL_MS = 2500;
  const THROWER_EGG_DELAY_MS = 1500;
  const BOSS_WEAKSPOT_EGG_MIN_MS = 3300;
  const BOSS_WEAKSPOT_EGG_MAX_MS = 5000;
  const BOSS_HITS_TO_KILL = 10;

  const counters = [
    { x: 0, y: 0, w: 0, h: 0 },
    { x: 0, y: 0, w: 0, h: 0 },
    { x: 0, y: 0, w: 0, h: 0 }
  ];

  function resize() {
    DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    W = Math.floor(window.innerWidth);
    H = Math.floor(window.innerHeight);
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    const marginX = W * 0.07;
    const counterW = W - marginX * 2;
    const counterH = Math.max(52, H * 0.073);
    const top = H * 0.235;
    const gap = H * 0.17;

    for (let i = 0; i < 3; i++) {
      counters[i].x = marginX;
      counters[i].y = top + gap * i;
      counters[i].w = counterW;
      counters[i].h = counterH;
    }
  }

  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function tone(freq, duration, type, volume) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function shotSound() {
    tone(125, 0.07, 'sawtooth', 0.28);
    setTimeout(() => tone(70, 0.055, 'square', 0.14), 28);
  }

  function hitSound() {
    tone(700, 0.05, 'square', 0.18);
    setTimeout(() => tone(980, 0.07, 'triangle', 0.12), 40);
  }

  function goldSound() {
    tone(820, 0.055, 'triangle', 0.16);
    setTimeout(() => tone(1220, 0.065, 'triangle', 0.12), 45);
    setTimeout(() => tone(1640, 0.085, 'sine', 0.09), 95);
  }

  function armorSound() {
    tone(320, 0.045, 'square', 0.17);
    setTimeout(() => tone(190, 0.075, 'sawtooth', 0.11), 35);
  }

  function hurtSound() {
    tone(180, 0.12, 'triangle', 0.13);
    setTimeout(() => tone(105, 0.12, 'sawtooth', 0.08), 70);
  }

  function bossSound() {
    tone(90, 0.14, 'sawtooth', 0.18);
    setTimeout(() => tone(75, 0.16, 'sawtooth', 0.15), 130);
  }

  function rand(min, max) {
    return min + Math.random() * (max - min);
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function roundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function difficulty(now) {
    const elapsed = state === 'chickens'
      ? totalChickenTime + (now - chickenPhaseStart)
      : totalChickenTime;
    return Math.max(0, elapsed / 1000);
  }

  function chickenVisibleMs(now) {
    return Math.max(1200, 3000 - difficulty(now) * 35);
  }

  function spawnDelay(now) {
    const d = difficulty(now);
    const min = Math.max(250, 780 - d * 14);
    const max = Math.max(420, 1300 - d * 20);
    return rand(min, max);
  }

  function eggDelay(now) {
    const d = difficulty(now);
    const min = Math.max(430, 900 - d * 8);
    const max = Math.max(680, 1350 - d * 10);
    return rand(min, max);
  }

  function playerTarget() {
    return {
      x: W / 2,
      y: H - Math.max(72, H * 0.085)
    };
  }

  function gunMuzzle() {
    return {
      x: W / 2,
      y: H - Math.max(70, H * 0.08) - 106
    };
  }

  function addParticle(x, y, vx, vy, r, life, color, type) {
    particles.push({ x, y, vx, vy, r, life, maxLife: life, color, type, rot: rand(0, Math.PI * 2), vr: rand(-0.16, 0.16) });
  }

  function burst(x, y, type, amount) {
    const count = amount || 12;
    for (let i = 0; i < count; i++) {
      const a = rand(0, Math.PI * 2);
      const sp = type === 'armor' ? rand(1.8, 4.8) : type === 'muzzle' ? rand(1.2, 4.2) : rand(1.0, 3.6);
      let color = '#fff2a6';
      let shape = 'dot';
      let life = rand(280, 620);
      let r = rand(2, 5);

      if (type === 'armor') {
        color = Math.random() < 0.45 ? '#c7cbd1' : '#7f8791';
        shape = 'shard';
        life = rand(420, 760);
        r = rand(3, 7);
      } else if (type === 'feather') {
        color = Math.random() < 0.55 ? '#fff1aa' : '#f3ca5d';
        shape = 'feather';
        life = rand(450, 850);
        r = rand(3, 7);
      } else if (type === 'egg') {
        color = Math.random() < 0.55 ? '#fff0c6' : '#f0b62e';
        shape = 'dot';
        life = rand(360, 700);
        r = rand(3, 8);
      } else if (type === 'gold') {
        color = Math.random() < 0.65 ? '#ffd84d' : '#fff2a6';
        shape = Math.random() < 0.42 ? 'spark' : 'dot';
        life = rand(420, 820);
        r = rand(3, 8);
      } else if (type === 'ammo') {
        color = Math.random() < 0.55 ? '#7fd0ff' : '#fff2a6';
        shape = Math.random() < 0.48 ? 'spark' : 'shard';
        life = rand(360, 720);
        r = rand(3, 7);
      } else if (type === 'blood') {
        color = Math.random() < 0.55 ? '#e52323' : '#ff9a76';
        shape = 'dot';
        life = rand(300, 650);
        r = rand(3, 6);
      } else if (type === 'muzzle') {
        color = Math.random() < 0.68 ? '#ffe86e' : 'rgba(210,210,210,0.65)';
        shape = Math.random() < 0.55 ? 'spark' : 'smoke';
        life = rand(150, 420);
        r = rand(2, 6);
      }

      addParticle(x, y, Math.cos(a) * sp, Math.sin(a) * sp - (type === 'muzzle' ? 1.3 : 0.4), r, life, color, shape);
    }
  }

  function spawnShell() {
    const m = gunMuzzle();
    shells.push({
      x: m.x + 18,
      y: m.y + 18,
      vx: rand(2.5, 4.6),
      vy: rand(-4.8, -2.8),
      rot: rand(0, Math.PI * 2),
      vr: rand(0.22, 0.42),
      life: 1200,
      maxLife: 1200
    });
  }

  function shotEffects() {
    gunKick = 1;
    const m = gunMuzzle();
    burst(m.x, m.y, 'muzzle', 16);
    spawnShell();
  }

  function startGame(now) {
    score = 0;
    lives = MAX_LIVES;
    ammo = START_AMMO;
    gameOverReason = '';
    totalChickenTime = 0;
    bossHits = 0;
    bossDeadAnim = 0;
    chickens = [];
    eggs = [];
    goldenEggs = [];
    ammoPacks = [];
    popups = [];
    shotMarks = [];
    particles = [];
    shells = [];
    gunKick = 0;
    nextGoldenEgg = 0;
    nextAmmoPack = 0;
    startTime = now;
    lastTime = now;
    enterChickens(now, true);
  }

  function enterChickens(now, fresh) {
    state = 'chickens';
    stateStart = now;
    chickenPhaseStart = now;
    chickens = [];
    eggs = [];
    goldenEggs = [];
    ammoPacks = [];
    activeWeakspot = null;
    nextSpawn = now + (fresh ? 350 : 550);
    nextGoldenEgg = now + (fresh ? rand(6500, 11000) : rand(4500, 8500));
    nextAmmoPack = now + AMMO_PACK_INTERVAL_MS;
  }

  function enterBossEggs(now) {
    totalChickenTime += now - chickenPhaseStart;
    state = 'bossEggs';
    stateStart = now;
    chickens = [];
    eggs = [];
    goldenEggs = [];
    ammoPacks = [];
    activeWeakspot = null;
    bossHits = 0;
    nextEgg = now + 650;
    nextAmmoPack = now + AMMO_PACK_INTERVAL_MS;
    bossSound();
    popups.push({ x: W / 2, y: H * 0.18, text: 'BOSS!', life: 1200, color: '#ffdf6d' });
  }

  function enterBossWeakspots(now) {
    state = 'bossWeakspots';
    stateStart = now;
    eggs = [];
    bossHits = 0;
    nextEgg = now + rand(BOSS_WEAKSPOT_EGG_MIN_MS, BOSS_WEAKSPOT_EGG_MAX_MS);
    nextAmmoPack = now + AMMO_PACK_INTERVAL_MS;
    makeWeakspot();
    popups.push({ x: W / 2, y: H * 0.18, text: 'STRZELAJ W PLAMKI', life: 1100, color: '#ffdf6d' });
  }

  function killBoss(now) {
    state = 'bossDead';
    stateStart = now;
    bossDeadAnim = 1100;
    activeWeakspot = null;
    eggs = [];
    ammoPacks = [];
    score += 5;
    hitSound();
    popups.push({ x: W / 2, y: H * 0.27, text: '+5 BOSS', life: 1000, color: '#fff2a6' });
  }

  function endGame(reason) {
    state = 'gameOver';
    gameOverReason = reason || gameOverReason || 'Koniec gry';
    chickens = [];
    eggs = [];
    goldenEggs = [];
    ammoPacks = [];
    activeWeakspot = null;
  }

  function loseLife(x, y, label) {
    lives -= 1;
    shake = 180;
    hurtSound();
    popups.push({ x, y, text: label || '-1 życie', life: 750, color: '#ffb37b' });
    if (lives <= 0) endGame('Brak żyć');
  }

  function finishShotAmmoCheck() {
    if (ammo <= 0 && state !== 'gameOver') {
      endGame('Brak amunicji');
    }
  }

  function spawnChicken(now) {
    if (chickens.length >= MAX_CHICKENS) return;

    const usedRows = new Set(chickens.map(c => c.row));
    const available = [0, 1, 2].filter(r => !usedRows.has(r));
    if (!available.length) return;

    const row = available[Math.floor(Math.random() * available.length)];
    const counter = counters[row];
    const baseSize = Math.max(43, Math.min(76, W * 0.14));
    const scale = rand(0.75, 1.0);
    const size = baseSize * scale;
    const x = rand(counter.x + baseSize * 0.8, counter.x + counter.w - baseSize * 0.8);
    const hiddenY = counter.y + counter.h * 0.18;
    const visibleY = counter.y - size * 0.38;
    const d = difficulty(now);
    const throwerChance = clamp(0.12 + d * 0.0015, 0.12, 0.23);
    const armorChance = clamp(0.18 + d * 0.003, 0.18, 0.35);
    const roll = Math.random();
    let type = 'normal';
    if (roll < throwerChance) type = 'thrower';
    else if (roll < throwerChance + armorChance) type = 'armored';

    const armored = type === 'armored';
    chickens.push({
      row,
      x,
      y: hiddenY,
      hiddenY,
      visibleY,
      size,
      scale,
      born: now,
      visibleMs: chickenVisibleMs(now),
      penalized: false,
      armored,
      type,
      hp: armored ? 2 : 1,
      armorBreakAt: 0,
      hasThrownEgg: false,
      throwAt: now + THROWER_EGG_DELAY_MS
    });
  }

  function spawnChickenEgg(chicken, now) {
    const p = playerTarget();
    eggs.push({
      source: 'chicken',
      x0: chicken.x,
      y0: chicken.y - chicken.size * 0.18,
      x1: p.x + rand(-W * 0.18, W * 0.18),
      y1: p.y - 38,
      x: chicken.x,
      y: chicken.y - chicken.size * 0.18,
      r: Math.max(14, Math.min(23, chicken.size * 0.31)),
      born: now,
      duration: EGG_TRAVEL_MS,
      hit: false,
      penalized: false
    });
    burst(chicken.x, chicken.y - chicken.size * 0.15, 'egg', 8);
  }

  function spawnGoldenEgg(now) {
    if (goldenEggs.length >= 1) return;
    const r = Math.max(17, Math.min(27, W * 0.052));
    const x = rand(r * 1.7, W - r * 1.7);
    goldenEggs.push({
      x,
      y0: -r * 2.2,
      y1: H + r * 2.2,
      y: -r * 2.2,
      r,
      born: now,
      duration: GOLDEN_EGG_FALL_MS,
      hit: false
    });
  }

  function spawnAmmoPack(now) {
    if (ammoPacks.length >= 2) return;
    const size = Math.max(32, Math.min(48, W * 0.105));
    let x;
    let y;

    if (state === 'chickens') {
      const row = Math.floor(Math.random() * counters.length);
      const c = counters[row];
      x = rand(c.x + size * 0.8, c.x + c.w - size * 0.8);
      y = c.y - size * 0.35;
    } else {
      x = rand(size, W - size);
      y = rand(H * 0.16, H * 0.68);
    }

    ammoPacks.push({
      x,
      y,
      size,
      born: now,
      duration: AMMO_PACK_VISIBLE_MS
    });
  }

  function collectAmmoPack(index) {
    const p = ammoPacks[index];
    ammoPacks.splice(index, 1);
    ammo += AMMO_PACK_ADD;
    hitSound();
    burst(p.x, p.y, 'ammo', 22);
    popups.push({ x: p.x, y: p.y - p.size * 0.72, text: '+5 AMMO', life: 760, color: '#7fd0ff' });
  }

  function hitAmmoPack(px, py) {
    for (let i = ammoPacks.length - 1; i >= 0; i--) {
      const p = ammoPacks[i];
      const dx = Math.abs(px - p.x);
      const dy = Math.abs(py - p.y);
      if (dx <= p.size * 0.62 && dy <= p.size * 0.52) {
        collectAmmoPack(i);
        return true;
      }
    }
    return false;
  }

  function updateAmmoPacks(now) {
    ammoPacks = ammoPacks.filter(p => now - p.born < p.duration);
    if ((state === 'chickens' || state === 'bossEggs' || state === 'bossWeakspots') && now >= nextAmmoPack) {
      spawnAmmoPack(now);
      nextAmmoPack = now + AMMO_PACK_INTERVAL_MS;
    }
  }

  function bossShape() {
    const s = Math.min(W * 0.72, H * 0.36);
    return {
      x: W / 2,
      y: H * 0.36,
      s,
      bodyRx: s * 0.37,
      bodyRy: s * 0.31,
      headR: s * 0.19
    };
  }

  function makeWeakspot() {
    const b = bossShape();
    const spots = [
      { x: b.x - b.s * 0.18, y: b.y - b.s * 0.02 },
      { x: b.x + b.s * 0.13, y: b.y + b.s * 0.05 },
      { x: b.x, y: b.y - b.s * 0.15 },
      { x: b.x - b.s * 0.05, y: b.y + b.s * 0.15 },
      { x: b.x + b.s * 0.22, y: b.y - b.s * 0.09 },
      { x: b.x - b.s * 0.27, y: b.y + b.s * 0.09 },
      { x: b.x + b.s * 0.02, y: b.y - b.s * 0.32 },
      { x: b.x - b.s * 0.12, y: b.y - b.s * 0.28 }
    ];
    const pick = spots[Math.floor(Math.random() * spots.length)];
    activeWeakspot = {
      x: pick.x,
      y: pick.y,
      r: Math.max(17, Math.min(28, W * 0.052)),
      born: performance.now()
    };
  }

  function spawnEgg(now) {
    const b = bossShape();
    const p = playerTarget();
    const offset = rand(-b.s * 0.18, b.s * 0.18);
    eggs.push({
      x0: b.x + offset,
      y0: b.y + b.s * 0.07,
      x1: p.x + rand(-W * 0.16, W * 0.16),
      y1: p.y - 42,
      x: b.x + offset,
      y: b.y + b.s * 0.07,
      r: Math.max(17, Math.min(28, W * 0.052)),
      born: now,
      duration: EGG_TRAVEL_MS,
      source: 'boss',
      hit: false,
      penalized: false
    });
  }

  function shoot(px, py, now) {
    initAudio();

    if (state === 'start' || state === 'gameOver') {
      startGame(now);
      return;
    }

    if (state === 'bossDead') return;

    if (ammo <= 0) {
      endGame('Brak amunicji');
      return;
    }

    shotSound();
    muzzleFlash = 130;
    shotEffects();
    shotMarks.push({ x: px, y: py, life: 180 });
    ammo -= 1;

    if (state === 'chickens') {
      if (hitAmmoPack(px, py)) {
        finishShotAmmoCheck();
        return;
      }

      let goldenIndex = -1;
      for (let i = goldenEggs.length - 1; i >= 0; i--) {
        const g = goldenEggs[i];
        const dx = px - g.x;
        const dy = py - g.y;
        const r = g.r * 1.45;
        if (dx * dx + dy * dy <= r * r) {
          goldenIndex = i;
          break;
        }
      }

      if (goldenIndex >= 0) {
        const g = goldenEggs[goldenIndex];
        goldenEggs.splice(goldenIndex, 1);
        score += 5;
        goldSound();
        burst(g.x, g.y, 'gold', 28);
        popups.push({ x: g.x, y: g.y, text: '+5 ZŁOTE', life: 820, color: '#ffe36a' });
        finishShotAmmoCheck();
        return;
      }

      let eggIndex = -1;
      for (let i = eggs.length - 1; i >= 0; i--) {
        const e = eggs[i];
        const dx = px - e.x;
        const dy = py - e.y;
        const r = e.r * 1.35;
        if (dx * dx + dy * dy <= r * r) {
          eggIndex = i;
          break;
        }
      }

      if (eggIndex >= 0) {
        const e = eggs[eggIndex];
        eggs.splice(eggIndex, 1);
        hitSound();
        burst(e.x, e.y, 'egg', 18);
        popups.push({ x: e.x, y: e.y, text: 'JAJKO!', life: 520, color: '#fff2a6' });
        finishShotAmmoCheck();
        return;
      }

      let hitIndex = -1;
      for (let i = chickens.length - 1; i >= 0; i--) {
        const c = chickens[i];
        const dx = px - c.x;
        const dy = py - c.y;
        const r = c.size * 0.5;
        if (dx * dx + dy * dy <= r * r) {
          hitIndex = i;
          break;
        }
      }

      if (hitIndex >= 0) {
        const c = chickens[hitIndex];
        if (c.armored && c.hp > 1) {
          c.armored = false;
          c.type = 'normal';
          c.hp = 1;
          c.armorBreakAt = now;
          armorSound();
          shake = Math.max(shake, 90);
          burst(c.x, c.y - c.size * 0.08, 'armor', 22);
          popups.push({ x: c.x, y: c.y - c.size * 0.68, text: 'ZBROJA!', life: 620, color: '#dfe4ea' });
        } else {
          chickens.splice(hitIndex, 1);
          score += 1;
          hitSound();
          burst(c.x, c.y, 'feather', 18);
          popups.push({ x: c.x, y: c.y - c.size * 0.55, text: '+1', life: 650, color: '#fff2a6' });
        }
      }
      finishShotAmmoCheck();
      return;
    }

    if (state === 'bossEggs') {
      if (hitAmmoPack(px, py)) {
        finishShotAmmoCheck();
        return;
      }

      let hitIndex = -1;
      for (let i = eggs.length - 1; i >= 0; i--) {
        const e = eggs[i];
        const dx = px - e.x;
        const dy = py - e.y;
        const r = e.r * 1.35;
        if (dx * dx + dy * dy <= r * r) {
          hitIndex = i;
          break;
        }
      }

      if (hitIndex >= 0) {
        const e = eggs[hitIndex];
        eggs.splice(hitIndex, 1);
        hitSound();
        burst(e.x, e.y, 'egg', 18);
        popups.push({ x: e.x, y: e.y, text: 'TRAFIONE', life: 520, color: '#fff2a6' });
      }
      finishShotAmmoCheck();
      return;
    }

    if (state === 'bossWeakspots') {
      if (hitAmmoPack(px, py)) {
        finishShotAmmoCheck();
        return;
      }

      let eggIndex = -1;
      for (let i = eggs.length - 1; i >= 0; i--) {
        const e = eggs[i];
        const dx = px - e.x;
        const dy = py - e.y;
        const r = e.r * 1.35;
        if (dx * dx + dy * dy <= r * r) {
          eggIndex = i;
          break;
        }
      }

      if (eggIndex >= 0) {
        const e = eggs[eggIndex];
        eggs.splice(eggIndex, 1);
        hitSound();
        burst(e.x, e.y, 'egg', 18);
        popups.push({ x: e.x, y: e.y, text: 'JAJKO!', life: 520, color: '#fff2a6' });
        finishShotAmmoCheck();
        return;
      }

      if (activeWeakspot) {
        const dx = px - activeWeakspot.x;
        const dy = py - activeWeakspot.y;
        const r = activeWeakspot.r * 1.25;
        if (dx * dx + dy * dy <= r * r) {
          bossHits += 1;
          score += 1;
          hitSound();
          burst(activeWeakspot.x, activeWeakspot.y, 'blood', 16);
          popups.push({ x: activeWeakspot.x, y: activeWeakspot.y - 18, text: bossHits + '/10', life: 600, color: '#fff2a6' });
          if (bossHits >= BOSS_HITS_TO_KILL) {
            killBoss(now);
          } else {
            makeWeakspot();
          }
        }
      }
      finishShotAmmoCheck();
    }
  }

  function pointerDown(e) {
    e.preventDefault();
    if (e.pointerId !== undefined && e.isPrimary === false) return;
    const rect = canvas.getBoundingClientRect();
    shoot(e.clientX - rect.left, e.clientY - rect.top, performance.now());
  }

  if (window.PointerEvent) {
    canvas.addEventListener('pointerdown', pointerDown, { passive: false });
  } else {
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.changedTouches[0];
      const rect = canvas.getBoundingClientRect();
      shoot(t.clientX - rect.left, t.clientY - rect.top, performance.now());
    }, { passive: false });
    canvas.addEventListener('mousedown', pointerDown, { passive: false });
  }

  function drawBackground(now) {
    const sx = shake > 0 ? rand(-3, 3) : 0;
    const sy = shake > 0 ? rand(-3, 3) : 0;
    ctx.save();
    ctx.translate(sx, sy);

    ctx.fillStyle = '#7a4a29';
    ctx.fillRect(-8, -8, W + 16, H + 16);

    ctx.fillStyle = 'rgba(255, 218, 120, 0.13)';
    for (let i = 0; i < 10; i++) {
      const x = (i * 83 + 20) % Math.max(1, W);
      ctx.fillRect(x, 0, 7, H);
    }

    ctx.fillStyle = '#4b2d18';
    ctx.fillRect(0, H * 0.09, W, 10);

    ctx.fillStyle = '#eac778';
    ctx.font = `bold ${Math.max(21, W * 0.065)}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText('KURNIK SHOOTER', W / 2, H * 0.075);

    if (state === 'bossEggs' || state === 'bossWeakspots' || state === 'bossDead') {
      ctx.fillStyle = 'rgba(90, 20, 12, 0.28)';
      ctx.fillRect(0, H * 0.11, W, H);
      ctx.fillStyle = 'rgba(255, 230, 100, 0.10)';
      ctx.beginPath();
      ctx.arc(W / 2, H * 0.33, Math.min(W, H) * 0.38 + Math.sin(now / 200) * 8, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawCounter(c, index) {
    ctx.fillStyle = '#3a2416';
    roundedRect(c.x + 8, c.y + 10, c.w, c.h, 16);
    ctx.fill();

    ctx.fillStyle = '#b8783d';
    roundedRect(c.x, c.y, c.w, c.h, 16);
    ctx.fill();

    ctx.fillStyle = '#8b5128';
    ctx.fillRect(c.x, c.y + c.h * 0.58, c.w, c.h * 0.18);

    ctx.strokeStyle = '#5d351f';
    ctx.lineWidth = 4;
    for (let i = 1; i < 5; i++) {
      const x = c.x + (c.w / 5) * i;
      ctx.beginPath();
      ctx.moveTo(x, c.y + 5);
      ctx.lineTo(x, c.y + c.h - 5);
      ctx.stroke();
    }

    ctx.fillStyle = '#f0d08b';
    ctx.font = `bold ${Math.max(13, W * 0.035)}px system-ui`;
    ctx.textAlign = 'left';
    ctx.fillText('LADA ' + (index + 1), c.x + 14, c.y + c.h * 0.42);
  }

  function drawChicken(c, now) {
    const age = now - c.born;
    const showProgress = Math.min(1, age / 320);
    const hideStart = c.visibleMs - 400;
    const hideProgress = age > hideStart ? Math.min(1, (age - hideStart) / 400) : 0;
    const p = Math.max(0, showProgress - hideProgress);
    c.y = c.hiddenY + (c.visibleY - c.hiddenY) * p;

    const s = c.size;
    ctx.save();
    ctx.translate(c.x, c.y);

    ctx.fillStyle = '#f7df83';
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.45, s * 0.39, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fff1aa';
    ctx.beginPath();
    ctx.arc(0, -s * 0.29, s * 0.27, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#d73b2e';
    ctx.beginPath();
    ctx.arc(-s * 0.06, -s * 0.58, s * 0.08, 0, Math.PI * 2);
    ctx.arc(s * 0.06, -s * 0.59, s * 0.08, 0, Math.PI * 2);
    ctx.arc(s * 0.16, -s * 0.54, s * 0.07, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(-s * 0.09, -s * 0.33, s * 0.035, 0, Math.PI * 2);
    ctx.arc(s * 0.09, -s * 0.33, s * 0.035, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ef8f22';
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.24);
    ctx.lineTo(s * 0.18, -s * 0.17);
    ctx.lineTo(0, -s * 0.1);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = '#d8a840';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(-s * 0.31, 0, s * 0.13, 0.2, 2.8);
    ctx.arc(s * 0.31, 0, s * 0.13, 0.3, 2.9);
    ctx.stroke();

    if (c.type === 'thrower') {
      ctx.fillStyle = '#7fd0ff';
      roundedRect(-s * 0.28, -s * 0.48, s * 0.56, s * 0.08, s * 0.04);
      ctx.fill();
      ctx.fillStyle = '#fff0c6';
      ctx.beginPath();
      ctx.ellipse(s * 0.36, -s * 0.04, s * 0.12, s * 0.17, -0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#d9b56f';
      ctx.lineWidth = Math.max(1.5, s * 0.025);
      ctx.stroke();
    }

    if (c.armored) {
      ctx.fillStyle = '#9ca3ad';
      roundedRect(-s * 0.34, -s * 0.17, s * 0.68, s * 0.31, s * 0.09);
      ctx.fill();

      ctx.fillStyle = '#c9d0d7';
      roundedRect(-s * 0.28, -s * 0.50, s * 0.56, s * 0.18, s * 0.09);
      ctx.fill();

      ctx.fillStyle = '#7a828c';
      ctx.fillRect(-s * 0.28, -s * 0.39, s * 0.56, s * 0.04);

      ctx.strokeStyle = '#646b74';
      ctx.lineWidth = Math.max(2, s * 0.035);
      ctx.beginPath();
      ctx.moveTo(-s * 0.20, -s * 0.12);
      ctx.lineTo(-s * 0.06, s * 0.07);
      ctx.moveTo(s * 0.14, -s * 0.14);
      ctx.lineTo(s * 0.03, s * 0.08);
      ctx.stroke();

      ctx.fillStyle = '#f3f6f8';
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.arc(i * s * 0.18, -s * 0.05, s * 0.028, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    if (c.armorBreakAt && now - c.armorBreakAt < 260) {
      const a = 1 - (now - c.armorBreakAt) / 260;
      ctx.globalAlpha = a;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, -s * 0.04, s * (0.42 + (1 - a) * 0.28), 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  function drawBoss(now) {
    const b = bossShape();
    const pulse = Math.sin(now / 180) * 3;
    const dead = state === 'bossDead';
    const fade = dead ? clamp(bossDeadAnim / 1100, 0, 1) : 1;

    ctx.save();
    ctx.globalAlpha = fade;
    ctx.translate(b.x, b.y + (dead ? (1 - fade) * 55 : 0));
    ctx.rotate(dead ? (1 - fade) * 0.22 : Math.sin(now / 480) * 0.018);

    const s = b.s + pulse;

    ctx.fillStyle = '#8c4f24';
    ctx.beginPath();
    ctx.ellipse(-s * 0.25, s * 0.12, s * 0.18, s * 0.11, -0.45, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s * 0.25, s * 0.12, s * 0.18, s * 0.11, 0.45, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#f6c25b';
    ctx.beginPath();
    ctx.ellipse(0, s * 0.05, s * 0.37, s * 0.31, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ffd778';
    ctx.beginPath();
    ctx.arc(0, -s * 0.24, s * 0.19, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#d6332d';
    ctx.beginPath();
    ctx.arc(-s * 0.09, -s * 0.47, s * 0.065, 0, Math.PI * 2);
    ctx.arc(0, -s * 0.50, s * 0.078, 0, Math.PI * 2);
    ctx.arc(s * 0.09, -s * 0.47, s * 0.065, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#151515';
    ctx.beginPath();
    ctx.arc(-s * 0.07, -s * 0.27, s * 0.024, 0, Math.PI * 2);
    ctx.arc(s * 0.07, -s * 0.27, s * 0.024, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#151515';
    ctx.lineWidth = Math.max(3, s * 0.018);
    ctx.beginPath();
    ctx.moveTo(-s * 0.12, -s * 0.34);
    ctx.lineTo(-s * 0.03, -s * 0.31);
    ctx.moveTo(s * 0.12, -s * 0.34);
    ctx.lineTo(s * 0.03, -s * 0.31);
    ctx.stroke();

    ctx.fillStyle = '#ef8f22';
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.19);
    ctx.lineTo(s * 0.13, -s * 0.11);
    ctx.lineTo(0, -s * 0.04);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#f1a130';
    ctx.beginPath();
    ctx.ellipse(-s * 0.13, s * 0.37, s * 0.08, s * 0.035, 0.1, 0, Math.PI * 2);
    ctx.ellipse(s * 0.13, s * 0.37, s * 0.08, s * 0.035, -0.1, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    if (state === 'bossWeakspots' && activeWeakspot) drawWeakspot(now);
  }

  function drawWeakspot(now) {
    const w = activeWeakspot;
    const pulse = Math.sin(now / 90) * 4;
    ctx.save();
    ctx.fillStyle = '#e52323';
    ctx.beginPath();
    ctx.arc(w.x, w.y, w.r + pulse, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#fff0b0';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(w.x, w.y, w.r + 7 + pulse * 0.35, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  function drawEgg(e, now) {
    const p = clamp((now - e.born) / (e.duration || EGG_TRAVEL_MS), 0, 1);
    const ease = p * p * (3 - 2 * p);
    e.x = e.x0 + (e.x1 - e.x0) * ease;
    e.y = e.y0 + (e.y1 - e.y0) * ease;
    const scale = 0.78 + p * 0.65;

    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(p * 2.7);
    ctx.fillStyle = '#fff0c6';
    ctx.beginPath();
    ctx.ellipse(0, 0, e.r * 0.82 * scale, e.r * 1.12 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#d9b56f';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  function drawGoldenEgg(g, now) {
    const p = clamp((now - g.born) / g.duration, 0, 1);
    const bob = Math.sin(now / 80 + g.x) * 4;
    g.y = g.y0 + (g.y1 - g.y0) * p;

    ctx.save();
    ctx.translate(g.x, g.y + bob);
    ctx.rotate(Math.sin(now / 150) * 0.25);

    ctx.fillStyle = 'rgba(255, 230, 70, 0.28)';
    ctx.beginPath();
    ctx.arc(0, 0, g.r * 1.75, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ffd84d';
    ctx.beginPath();
    ctx.ellipse(0, 0, g.r * 0.86, g.r * 1.18, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#fff2a6';
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.beginPath();
    ctx.ellipse(-g.r * 0.22, -g.r * 0.34, g.r * 0.18, g.r * 0.34, -0.45, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawAmmoPack(p, now) {
    const age = now - p.born;
    const blink = age > p.duration - 700 && Math.floor(now / 90) % 2 === 0;
    if (blink) return;

    const s = p.size;
    ctx.save();
    ctx.translate(p.x, p.y + Math.sin(now / 160 + p.x) * 2);

    ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
    ctx.beginPath();
    ctx.ellipse(0, s * 0.37, s * 0.54, s * 0.16, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#315a72';
    roundedRect(-s * 0.52, -s * 0.34, s * 1.04, s * 0.68, s * 0.12);
    ctx.fill();

    ctx.fillStyle = '#7fd0ff';
    roundedRect(-s * 0.42, -s * 0.23, s * 0.84, s * 0.46, s * 0.08);
    ctx.fill();

    ctx.fillStyle = '#1c3443';
    ctx.fillRect(-s * 0.07, -s * 0.20, s * 0.14, s * 0.40);
    ctx.fillRect(-s * 0.25, -s * 0.05, s * 0.50, s * 0.10);

    ctx.fillStyle = '#fff2a6';
    ctx.font = `bold ${Math.max(10, s * 0.28)}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText('+5', 0, -s * 0.42);

    ctx.restore();
  }

  function drawGun() {
    const gx = W / 2;
    const gy = H - Math.max(70, H * 0.08);
    const recoil = gunKick * Math.max(14, H * 0.022);

    ctx.save();
    ctx.translate(gx, gy + recoil);
    ctx.rotate(-gunKick * 0.035);

    ctx.fillStyle = '#d6a071';
    roundedRect(-34, 18, 68, 46, 18);
    ctx.fill();

    ctx.fillStyle = '#30343a';
    roundedRect(-24, -42, 48, 70, 10);
    ctx.fill();

    ctx.fillStyle = '#545b65';
    roundedRect(-31, -70, 62, 34, 8);
    ctx.fill();

    ctx.fillStyle = '#20242a';
    ctx.fillRect(-8, -98, 16, 34);

    if (muzzleFlash > 0) {
      ctx.fillStyle = 'rgba(255, 230, 80, 0.92)';
      ctx.beginPath();
      ctx.moveTo(0, -124);
      ctx.lineTo(-20, -94);
      ctx.lineTo(20, -94);
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();
  }

  function drawHUD(now) {
    ctx.fillStyle = 'rgba(30, 20, 12, 0.74)';
    roundedRect(12, 12, W - 24, 62, 14);
    ctx.fill();

    ctx.fillStyle = '#fff4cf';
    ctx.font = `bold ${Math.max(16, W * 0.043)}px system-ui`;
    ctx.textAlign = 'left';
    ctx.fillText('Punkty: ' + score, 26, 38);

    ctx.textAlign = 'right';
    ctx.fillText('Życia: ' + '❤'.repeat(Math.max(0, lives)), W - 26, 38);

    ctx.textAlign = 'center';
    ctx.fillText('Amunicja: ' + ammo, W / 2, 38);

    ctx.textAlign = 'center';
    ctx.font = `bold ${Math.max(13, W * 0.034)}px system-ui`;
    let label = '';
    if (state === 'chickens') label = 'KURY';
    if (state === 'bossEggs') label = 'BOSS: JAJKA';
    if (state === 'bossWeakspots') label = 'BOSS: ' + bossHits + '/10';
    if (state === 'bossDead') label = 'BOSS POKONANY';
    ctx.fillText(label, W / 2, 61);

    if (state === 'chickens') {
      const phase = clamp((now - chickenPhaseStart) / BOSS_AFTER_MS, 0, 1);
      ctx.fillStyle = 'rgba(255, 238, 170, 0.85)';
      roundedRect(W * 0.25, 78, W * 0.5, 8, 5);
      ctx.fill();
      ctx.fillStyle = 'rgba(206, 58, 40, 0.9)';
      roundedRect(W * 0.25, 78, W * 0.5 * phase, 8, 5);
      ctx.fill();
    }
  }

  function drawShotMarks(dt) {
    for (const s of shotMarks) {
      s.life -= dt;
      const alpha = Math.max(0, s.life / 180);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#fff0a5';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(s.x - 8, s.y);
      ctx.lineTo(s.x + 8, s.y);
      ctx.moveTo(s.x, s.y - 8);
      ctx.lineTo(s.x, s.y + 8);
      ctx.stroke();
      ctx.restore();
    }
    shotMarks = shotMarks.filter(s => s.life > 0);
  }

  function drawParticles(dt) {
    const gravity = 0.018 * dt;

    for (const p of particles) {
      p.life -= dt;
      p.vy += gravity * 0.16;
      p.x += p.vx * dt / 16.67;
      p.y += p.vy * dt / 16.67;
      p.rot += p.vr * dt / 16.67;

      const alpha = Math.max(0, p.life / p.maxLife);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.strokeStyle = p.color;

      if (p.type === 'shard') {
        ctx.beginPath();
        ctx.moveTo(-p.r, p.r * 0.6);
        ctx.lineTo(p.r * 1.2, 0);
        ctx.lineTo(-p.r * 0.4, -p.r * 0.8);
        ctx.closePath();
        ctx.fill();
      } else if (p.type === 'feather') {
        ctx.beginPath();
        ctx.ellipse(0, 0, p.r * 0.55, p.r * 1.25, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(120,80,25,0.35)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, -p.r);
        ctx.lineTo(0, p.r);
        ctx.stroke();
      } else if (p.type === 'spark') {
        ctx.lineWidth = Math.max(2, p.r * 0.35);
        ctx.beginPath();
        ctx.moveTo(-p.r * 1.6, 0);
        ctx.lineTo(p.r * 1.6, 0);
        ctx.stroke();
      } else if (p.type === 'smoke') {
        ctx.fillStyle = 'rgba(215,215,215,0.45)';
        ctx.beginPath();
        ctx.arc(0, 0, p.r * (1.2 + (1 - alpha) * 1.8), 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    particles = particles.filter(p => p.life > 0);

    for (const s of shells) {
      s.life -= dt;
      s.vy += gravity * 0.52;
      s.x += s.vx * dt / 16.67;
      s.y += s.vy * dt / 16.67;
      s.rot += s.vr * dt / 16.67;

      const alpha = Math.max(0, s.life / s.maxLife);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rot);
      ctx.fillStyle = '#d7a13b';
      roundedRect(-4, -9, 8, 18, 3);
      ctx.fill();
      ctx.fillStyle = '#fff0a6';
      ctx.fillRect(-3, -8, 6, 3);
      ctx.restore();
    }
    shells = shells.filter(s => s.life > 0 && s.y < H + 50);
  }

  function drawPopups(dt) {
    ctx.textAlign = 'center';
    for (const p of popups) {
      p.life -= dt;
      p.y -= dt * 0.035;
      ctx.globalAlpha = Math.max(0, p.life / 900);
      ctx.fillStyle = p.color || '#fff2a6';
      ctx.font = `bold ${Math.max(18, W * 0.05)}px system-ui`;
      ctx.fillText(p.text, p.x, p.y);
      ctx.globalAlpha = 1;
    }
    popups = popups.filter(p => p.life > 0);
  }

  function drawStartOrEnd() {
    if (state !== 'start' && state !== 'gameOver') return;

    ctx.fillStyle = 'rgba(0, 0, 0, 0.50)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#fff4cf';
    ctx.textAlign = 'center';
    ctx.font = `bold ${Math.max(30, W * 0.083)}px system-ui`;
    ctx.fillText(state === 'gameOver' ? 'KONIEC GRY' : 'KURNIK SHOOTER', W / 2, H * 0.34);

    ctx.font = `bold ${Math.max(19, W * 0.052)}px system-ui`;
    if (state === 'gameOver') {
      ctx.fillText('Wynik: ' + score, W / 2, H * 0.405);
      ctx.fillText(gameOverReason || 'Koniec gry', W / 2, H * 0.455);
    }
    ctx.fillText('Dotknij ekran, aby ' + (state === 'gameOver' ? 'zagrać ponownie' : 'zacząć'), W / 2, H * 0.51);

    ctx.font = `${Math.max(14, W * 0.038)}px system-ui`;
    ctx.fillText('Start: 20 amunicji. Pojemniki dają +5.', W / 2, H * 0.59);
    ctx.fillText('Pudła zużywają ammo. Obrażenia: kury i jajka.', W / 2, H * 0.635);
  }

  function updateChickens(now) {
    if (now - chickenPhaseStart >= BOSS_AFTER_MS) {
      enterBossEggs(now);
      return;
    }

    updateAmmoPacks(now);

    const remaining = [];
    for (const c of chickens) {
      if (c.type === 'thrower' && !c.hasThrownEgg && now >= c.throwAt) {
        c.hasThrownEgg = true;
        spawnChickenEgg(c, now);
      }

      if (now - c.born >= c.visibleMs) {
        if (!c.penalized) {
          c.penalized = true;
          loseLife(c.x, c.visibleY - c.size * 0.55, '-1 życie');
          if (state === 'gameOver') return;
        }
      } else {
        remaining.push(c);
      }
    }
    chickens = remaining;

    const remainingEggs = [];
    for (const e of eggs) {
      const duration = e.duration || EGG_TRAVEL_MS;
      if (now - e.born >= duration) {
        if (!e.penalized) {
          e.penalized = true;
          loseLife(e.x1, e.y1, '-1 życie');
          if (state === 'gameOver') return;
        }
      } else {
        remainingEggs.push(e);
      }
    }
    eggs = remainingEggs;

    const remainingGolden = [];
    for (const g of goldenEggs) {
      if (now - g.born < g.duration) remainingGolden.push(g);
    }
    goldenEggs = remainingGolden;

    if (now >= nextGoldenEgg) {
      spawnGoldenEgg(now);
      nextGoldenEgg = now + rand(9000, 17000);
    }

    if (now >= nextSpawn && chickens.length < MAX_CHICKENS) {
      spawnChicken(now);
      nextSpawn = now + spawnDelay(now);
      if (chickens.length < MAX_CHICKENS && Math.random() < 0.33) {
        spawnChicken(now);
      }
    }
  }

  function updateBossEggs(now) {
    if (now - stateStart >= BOSS_EGG_PHASE_MS) {
      enterBossWeakspots(now);
      return;
    }

    updateAmmoPacks(now);

    if (now >= nextEgg) {
      spawnEgg(now);
      nextEgg = now + eggDelay(now);
    }

    const remaining = [];
    for (const e of eggs) {
      if (now - e.born >= (e.duration || EGG_TRAVEL_MS)) {
        if (!e.penalized) {
          e.penalized = true;
          loseLife(e.x1, e.y1, '-1 życie');
          if (state === 'gameOver') return;
        }
      } else {
        remaining.push(e);
      }
    }
    eggs = remaining;
  }

  function updateBossWeakspots(now) {
    updateAmmoPacks(now);

    if (now >= nextEgg) {
      spawnEgg(now);
      nextEgg = now + rand(BOSS_WEAKSPOT_EGG_MIN_MS, BOSS_WEAKSPOT_EGG_MAX_MS);
    }

    const remaining = [];
    for (const e of eggs) {
      if (now - e.born >= (e.duration || EGG_TRAVEL_MS)) {
        if (!e.penalized) {
          e.penalized = true;
          loseLife(e.x1, e.y1, '-1 życie');
          if (state === 'gameOver') return;
        }
      } else {
        remaining.push(e);
      }
    }
    eggs = remaining;
  }

  function updateBossDead(now, dt) {
    bossDeadAnim -= dt;
    if (bossDeadAnim <= 0) {
      enterChickens(now, false);
    }
  }

  function update(now) {
    const dt = Math.min(50, now - lastTime);
    lastTime = now;

    if (muzzleFlash > 0) muzzleFlash -= dt;
    if (shake > 0) shake -= dt;
    if (gunKick > 0) gunKick = Math.max(0, gunKick - dt / 145);

    if (state === 'chickens') updateChickens(now);
    else if (state === 'bossEggs') updateBossEggs(now);
    else if (state === 'bossWeakspots') updateBossWeakspots(now);
    else if (state === 'bossDead') updateBossDead(now, dt);

    ctx.save();
    drawBackground(now);

    if (state === 'chickens' || state === 'start' || state === 'gameOver') {
      chickens.forEach(c => drawChicken(c, now));
      if (state === 'chickens') ammoPacks.forEach(p => drawAmmoPack(p, now));
      counters.forEach((c, i) => drawCounter(c, i));
      if (state === 'chickens') {
        eggs.forEach(e => drawEgg(e, now));
        goldenEggs.forEach(g => drawGoldenEgg(g, now));
      }
    }

    if (state === 'bossEggs' || state === 'bossWeakspots' || state === 'bossDead') {
      drawBoss(now);
      if (state === 'bossEggs' || state === 'bossWeakspots') ammoPacks.forEach(p => drawAmmoPack(p, now));
      eggs.forEach(e => drawEgg(e, now));
    }

    drawParticles(dt);
    drawGun();
    if (state !== 'start' && state !== 'gameOver') drawHUD(now);
    drawShotMarks(dt);
    drawPopups(dt);
    drawStartOrEnd();
    ctx.restore();

    requestAnimationFrame(update);
  }

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', () => setTimeout(resize, 80));

  resize();
  requestAnimationFrame(t => {
    lastTime = t;
    update(t);
  });
})();
</script>
</body>
</html>
